<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تحذير - رابط مشبوه</title>
  <style>
    body {
       font-family: Arial, sans-serif;
       background: url("background.jpg") no-repeat center center fixed;
       background-size: cover;
       margin: 0;
       padding: 0;
       min-height: 100vh; 
       display: flex;
       justify-content: center;
       align-items: center;
    }
    .card {
      max-width: 700px;
      width: min(700px, 92vw);
      margin: auto;
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.1);
      padding: 25px;
    }
    h1 {
      color: #b00020;
      margin-bottom: 10px;
    }
    .url {
      word-break: break-all;
      background: #fde8e8;
      padding: 10px;
      border-radius: 8px;
      margin: 12px 0;
      font-size: 14px;
    }
    .explain{
        margin:14px auto 0;
        max-width:700px;
        background:#e1fffb;
        border:1px solid #8af3c9;
        padding:12px 14px;
        border-radius:10px;
        line-height:1.7;
        color:#5a4a12;
        text-align: center;
    }
    .actions a {
      display: inline-block;
      margin: 8px;
      padding: 12px 20px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: bold;
    }
    .danger { background:#b00020; color:#fff; }
    .ghost { background:#eee; color:#111; }
  </style>
</head>
<body>
  <div class="card">
    <h1>تحذير ⚠️</h1>
    <p>قد يكون هذا الرابط خبيثًا أو احتياليًا.</p>
    <div id="u" class="url"></div>
    <div id="x" class="explain">
    </div>

    <p>لا تفتح الرابط أو تُدخل أي معلومات شخصية.</p>
    <div class="actions">
      <a class="ghost" href="textbox.html">🔙 العودة للتحقق</a>
      <a class="ghost" href="call page.html">احم نفسك وبلغ!</a>
    </div>
  </div>

  <script>

  const lastUrl = sessionStorage.getItem("waeei_last_url") || "";
  const lastExp = sessionStorage.getItem("waeei_last_exp") || "";


  const params = new URLSearchParams(location.search);
  const u = lastUrl || params.get("u") || "";

  document.getElementById("u").textContent = u || "(لم يتم تحديد رابط)";


  const xBox = document.getElementById("x");
  if (lastExp && lastExp.trim().length > 0) {
    xBox.textContent = lastExp;
  } else {
    xBox.textContent = "تنبيه: تم تصنيف هذا الرابط كخبيث اعتمادًا على قواعد ومصادر التحليل. يُنصح بعدم فتحه.";
  }

 
  sessionStorage.removeItem("waeei_last_url");
  sessionStorage.removeItem("waeei_last_exp");
</script>

</body>
</html>
